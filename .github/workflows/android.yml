name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 环境
      uses: actions/setup-java@v4
      with:
        java-version: '17' # 建议使用 JDK 17，兼容大多数现代 Android 项目
        distribution: 'temurin'
        cache: gradle

    - name: 授予 Gradle 执行权限
      run: chmod +x gradlew

    - name: 使用 Gradle 构建 APK
      run: ./gradlew assembleDebug

    - name: 上传构建产物 (APK)
      uses: actions/upload-artifact@v4
      with:
        name: DroidOCR-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
