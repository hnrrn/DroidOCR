name: Android CI (with Prebuilt ncnn & OpenCV)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: 下载并准备预编译库 (修复路径逻辑)
      run: |
        # 1. 创建目标根目录
        mkdir -p app/src/main/jniLibs
        
        # 2. 处理 ncnn
        echo "Processing ncnn..."
        wget -q https://github.com/Tencent/ncnn/releases/download/20250916/ncnn-20250916-android-vulkan.zip
        unzip -q ncnn-20250916-android-vulkan.zip
        # 强制将解压目录下的内容移动到 jniLibs/ncnn，不留多余层级
        mkdir -p app/src/main/jniLibs/ncnn
        cp -r ncnn-20250916-android-vulkan/* app/src/main/jniLibs/ncnn/
        
        # 3. 处理 OpenCV
        echo "Processing OpenCV..."
        wget -q https://github.com/nihui/opencv-mobile/releases/download/v34/opencv-mobile-4.12.0-android.zip
        unzip -d opencv-mobile-4.12.0-android.zip app/src/main/jniLibs/OpenCV
        cp -r  app/src/main/jniLibs/OpenCV/*  app/src/main/jniLibs/

        # 4. 调试：在日志中打印路径结构，确认 libSPIRV.a 到底在哪里
        echo "Checking path for libSPIRV.a:"
        find app/src/main/jniLibs -name "libSPIRV.a"
        find app/src/main/jniLibs -name "ibkleidicv.a"

        # 5. 清理压宿包
        rm *.zip

        
    - name: 授予 Gradle 执行权限并生成 Wrapper
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: 使用 Gradle 构建 APK
      # 加上 --stacktrace 方便报错时排查具体是哪个库路径不对
      run: ./gradlew assembleDebug --stacktrace

    - name: 上传 APK 产物
      uses: actions/upload-artifact@v4
      with:
        name: DroidOCR-Prebuilt-APK
        path: app/build/outputs/apk/debug/*.apk
